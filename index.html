<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mascot Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0b0d;
      --panel: #101013;
      --surface: #161619;
      --border: #1e1e24;
      --border2: #28282f;
      --accent: #6EE7B7;
      --accent-dim: rgba(110,231,183,0.07);
      --text: #ededf0;
      --muted: #525260;
      --faint: #232328;
      --danger: #ff6b6b;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

    /* ── Layout ── */
    .app { display: flex; flex-direction: column; min-height: 100vh; }

    .topbar {
      height: 52px; flex-shrink: 0;
      background: var(--panel); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 10px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .topbar-title { font-size: 13px; font-weight: 700; }
    .topbar-tag {
      font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted);
      border: 1px solid var(--border2); border-radius: 4px; padding: 2px 7px; letter-spacing: .08em;
    }

    .body { display: flex; flex: 1; }

    /* ── Sidebar ── */
    .sidebar {
      width: 320px; flex-shrink: 0; background: var(--panel);
      border-right: 1px solid var(--border); padding: 18px;
      display: flex; flex-direction: column; gap: 16px; overflow-y: auto;
    }

    .tabs { display: flex; gap: 4px; background: var(--surface); border-radius: 9px; padding: 3px; }
    .tab {
      flex: 1; background: transparent; border: none; border-radius: 7px;
      color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 500; padding: 7px; transition: all .15s; text-align: center;
    }
    .tab.active { background: var(--bg); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.4); }

    .flabel {
      font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted);
      letter-spacing: .16em; text-transform: uppercase; margin-bottom: 7px;
    }

    textarea, input[type="text"] {
      width: 100%; background: var(--surface); border: 1px solid var(--border2);
      border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 12px; line-height: 1.7; padding: 10px 11px; resize: none;
      outline: none; transition: border-color .15s;
    }
    textarea:focus, input[type="text"]:focus { border-color: var(--accent); }
    textarea::placeholder, input::placeholder { color: var(--faint); }

    /* Pills */
    .pills { display: flex; flex-wrap: wrap; gap: 5px; }
    .pill {
      background: transparent; border: 1px solid var(--border2); border-radius: 100px;
      color: var(--muted); cursor: pointer; font-size: 11px; padding: 4px 11px;
      transition: all .12s; font-family: 'DM Sans', sans-serif;
    }
    .pill:hover { border-color: var(--border); color: var(--text); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

    /* Upload */
    .upload-zone {
      border: 1.5px dashed var(--border2); border-radius: 11px; height: 150px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: all .18s; overflow: hidden; position: relative; background: var(--surface);
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--accent-dim); }
    .upload-zone.filled { cursor: default; border-style: solid; border-color: var(--border2); }
    .up-empty { display: flex; flex-direction: column; align-items: center; gap: 7px; color: var(--muted); pointer-events: none; }
    .up-empty span { font-size: 12px; font-weight: 500; }
    .up-hint { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--faint) !important; }
    .up-preview { width: 100%; height: 100%; position: relative; }
    .up-preview img { width: 100%; height: 100%; object-fit: contain; padding: 10px; }
    .up-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,.7);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      opacity: 0; transition: opacity .15s;
    }
    .up-preview:hover .up-overlay { opacity: 1; }
    .up-btn {
      background: var(--accent); border: none; border-radius: 6px; color: #000;
      font-weight: 600; font-size: 11px; padding: 6px 13px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .up-btn.danger { background: var(--danger); color: #fff; }

    .var-count { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); margin-top: 5px; }
    .var-count span { color: var(--accent); }

    .err-box {
      background: rgba(255,107,107,.07); border: 1px solid rgba(255,107,107,.2);
      border-radius: 8px; color: var(--danger); font-family: 'DM Mono', monospace;
      font-size: 10px; padding: 9px 11px; line-height: 1.5;
    }

    .btn {
      width: 100%; background: var(--accent); border: none; border-radius: 10px; color: #000;
      cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700;
      padding: 12px; transition: opacity .15s, transform .1s;
    }
    .btn:hover:not(:disabled) { opacity: .85; transform: translateY(-1px); }
    .btn:disabled { opacity: .3; cursor: not-allowed; }
    .btn.stop { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
    .btn.ghost { background: transparent; border: 1px solid var(--border2); color: var(--muted); font-size: 12px; padding: 9px; }
    .btn.ghost:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); transform: none; opacity: 1; }

    /* Canvas */
    .canvas { flex: 1; padding: 22px; overflow-y: auto; }

    .canvas-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .prog-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
    .prog-label span { color: var(--accent); }
    .dl-all {
      background: transparent; border: 1px solid var(--border2); border-radius: 7px;
      color: var(--muted); cursor: pointer; font-family: 'DM Mono', monospace;
      font-size: 10px; padding: 5px 11px; transition: all .15s;
    }
    .dl-all:hover { color: var(--accent); border-color: var(--accent); }

    .prog-wrap { height: 2px; background: var(--border); border-radius: 2px; margin-bottom: 18px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .35s ease; box-shadow: 0 0 6px rgba(110,231,183,.3); }

    /* Cards grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 11px; }

    .checker {
      background-image: linear-gradient(45deg,#1c1c20 25%,transparent 25%),
        linear-gradient(-45deg,#1c1c20 25%,transparent 25%),
        linear-gradient(45deg,transparent 75%,#1c1c20 75%),
        linear-gradient(-45deg,transparent 75%,#1c1c20 75%);
      background-size: 12px 12px;
      background-position: 0 0, 0 6px, 6px -6px, -6px 0;
      background-color: #141416;
    }

    .rcard { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color .18s, transform .18s; }
    .rcard:hover { border-color: var(--accent); transform: translateY(-2px); }
    .rcard-img { height: 144px; display: flex; align-items: center; justify-content: center; }
    .rcard-img img { width: 116px; height: 116px; object-fit: contain; }
    .rcard-foot { padding: 8px 10px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 5px; min-height: 36px; }
    .rcard-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70px; }
    .rcard-btns { display: flex; gap: 4px; flex-shrink: 0; }
    .cbtn { background: transparent; border: 1px solid var(--border2); border-radius: 5px; color: var(--muted); cursor: pointer; font-family: 'DM Mono', monospace; font-size: 9px; padding: 3px 7px; transition: all .12s; }
    .cbtn:hover { color: var(--text); border-color: #444; }
    .cbtn.hi:hover { color: var(--accent); border-color: var(--accent); }

    /* Single result */
    .single-result { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 32px 0; }
    .single-card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; width: 260px; }
    .single-img { height: 240px; display: flex; align-items: center; justify-content: center; }
    .single-img img { width: 200px; height: 200px; object-fit: contain; }
    .single-foot { padding: 12px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
    .single-foot button { flex: 1; background: transparent; border: 1px solid var(--border2); border-radius: 7px; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; padding: 8px; transition: all .15s; }
    .single-foot button:hover { color: var(--accent); border-color: var(--accent); }
    .single-foot button.primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
    .single-foot button.primary:hover { opacity: .85; color: #000; border-color: var(--accent); }
    .hint-text { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-align: center; line-height: 1.6; }
    .hint-text strong { color: var(--accent); }

    /* Loading / error states */
    .state-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .state-wrap span { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
    .spin { width: 24px; height: 24px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    .spin-lg { width: 36px; height: 36px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty */
    .empty { height: 100%; min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
    .empty-icon { font-size: 38px; opacity: .15; }
    .empty-text { font-size: 13px; font-weight: 500; opacity: .3; }
    .empty-sub { font-family: 'DM Mono', monospace; font-size: 10px; opacity: .2; text-align: center; line-height: 1.7; max-width: 240px; }

    /* Mobile */
    @media (max-width: 680px) {
      .body { flex-direction: column; }
      .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
    }

    /* Hidden */
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="app">

  <!-- Topbar -->
  <header class="topbar">
    <div class="dot"></div>
    <span class="topbar-title">Mascot Studio</span>
    <span class="topbar-tag">NANO BANANA 2</span>
  </header>

  <div class="body">

    <!-- Sidebar -->
    <aside class="sidebar">

      <!-- Tabs -->
      <div>
        <div class="tabs">
          <button class="tab active" id="tab-generate" onclick="switchMode('generate')">✦ Generate</button>
          <button class="tab" id="tab-variations" onclick="switchMode('variations')">◈ Variations</button>
        </div>
      </div>

      <!-- GENERATE panel -->
      <div id="panel-generate">
        <div>
          <div class="flabel">App / Character Description</div>
          <textarea id="app-desc" rows="4" placeholder="e.g. Grounded — a screen time habit app with a small plant named Sprout that grows as you build healthy habits"></textarea>
        </div>
        <div>
          <div class="flabel">Art Style</div>
          <div class="pills" id="pills-style"></div>
        </div>
        <div>
          <div class="flabel">Personality / Mood</div>
          <div class="pills" id="pills-mood"></div>
        </div>
        <div id="gen-err" class="err-box hidden"></div>
        <button class="btn" id="btn-generate" onclick="handleGenerate()">Generate Mascot →</button>
      </div>

      <!-- VARIATIONS panel -->
      <div id="panel-variations" class="hidden">
        <div>
          <div class="flabel">Reference Mascot</div>
          <div class="upload-zone" id="upload-zone" onclick="uploadClick()" ondragover="onDragOver(event)" ondragleave="onDragLeave()" ondrop="onDrop(event)">
            <div class="up-empty" id="up-empty">
              <svg width="26" height="26" fill="none" viewBox="0 0 24 24">
                <path d="M12 4v12m0-12L8 8m4-4l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M4 17v1a2 2 0 002 2h12a2 2 0 002-2v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              <span>Drop reference image</span>
              <span class="up-hint">PNG · JPG · WebP</span>
            </div>
            <div class="up-preview hidden" id="up-preview">
              <img id="up-img" src="" alt="ref" />
              <div class="up-overlay">
                <button class="up-btn" onclick="event.stopPropagation(); uploadClick()">Change</button>
                <button class="up-btn danger" onclick="event.stopPropagation(); clearUpload()">Remove</button>
              </div>
            </div>
          </div>
          <input type="file" id="file-input" accept="image/*" style="display:none" onchange="onFileChange(event)" />
        </div>
        <div>
          <div class="flabel">Variation List — one per line</div>
          <textarea id="var-text" rows="8" placeholder="Golden/metallic version&#10;Hands covering eyes&#10;Sleeping with Z's&#10;...">Golden/metallic version
Hands covering eyes, peeking through fingers
Sleeping with Z's floating above
Angry with steam coming out of ears
Doing a victory dance
Wearing sunglasses, looking cool</textarea>
          <div class="var-count"><span id="var-count-num">6</span> variations queued</div>
        </div>
        <div id="var-err" class="err-box hidden"></div>
        <button class="btn" id="btn-variations" onclick="handleVariations()">Generate Variations →</button>
        <button class="btn ghost hidden" id="btn-stop" onclick="stopGeneration()">Stop Generation</button>
      </div>

    </aside>

    <!-- Canvas -->
    <main class="canvas" id="canvas">
      <div class="empty" id="empty-state">
        <div class="empty-icon">✦</div>
        <div class="empty-text">No mascot yet</div>
        <div class="empty-sub">Describe your app, pick a style and mood, then generate</div>
      </div>
      <div class="single-result hidden" id="gen-result"></div>
      <div class="hidden" id="var-result"></div>
    </main>

  </div>
</div>

<script>
  // ── State ──
  const STYLES = ["Flat 2D", "3D Cartoon", "Pixel Art", "Chibi", "Bold Graphic", "Minimalist"];
  const MOODS  = ["Friendly", "Energetic", "Playful", "Calm", "Mysterious", "Professional"];
  let selectedStyle = "Flat 2D";
  let selectedMood  = "Friendly";
  let refImageBase64 = null;
  let refImageType   = null;
  let currentMode    = "generate";
  let running        = false;
  let aborted        = false;
  let varCards       = [];

  // ── Init pills ──
  function makePills(containerId, options, getVal, setVal) {
    const el = document.getElementById(containerId);
    options.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "pill" + (getVal() === opt ? " active" : "");
      btn.textContent = opt;
      btn.onclick = () => {
        setVal(opt);
        el.querySelectorAll(".pill").forEach(b => b.classList.toggle("active", b.textContent === opt));
      };
      el.appendChild(btn);
    });
  }

  makePills("pills-style", STYLES, () => selectedStyle, v => selectedStyle = v);
  makePills("pills-mood",  MOODS,  () => selectedMood,  v => selectedMood  = v);

  // ── Var count update ──
  document.getElementById("var-text").addEventListener("input", updateVarCount);
  function updateVarCount() {
    const lines = document.getElementById("var-text").value.split("\n").map(l=>l.trim()).filter(Boolean);
    const el = document.getElementById("var-count-num");
    el.textContent = lines.length;
    const btn = document.getElementById("btn-variations");
    btn.textContent = `Generate ${lines.length} Variation${lines.length!==1?"s":""} →`;
  }

  // ── Mode switching ──
  function switchMode(mode) {
    currentMode = mode;
    document.getElementById("tab-generate").classList.toggle("active", mode === "generate");
    document.getElementById("tab-variations").classList.toggle("active", mode === "variations");
    document.getElementById("panel-generate").classList.toggle("hidden", mode !== "generate");
    document.getElementById("panel-variations").classList.toggle("hidden", mode === "generate");

    // Canvas empty state
    if (mode === "generate") {
      document.getElementById("empty-state").querySelector(".empty-text").textContent = "No mascot yet";
      document.getElementById("empty-state").querySelector(".empty-sub").textContent = "Describe your app, pick a style and mood, then generate";
    } else {
      document.getElementById("empty-state").querySelector(".empty-text").textContent = "No variations yet";
      document.getElementById("empty-state").querySelector(".empty-sub").textContent = "Upload your mascot, list your variations, and hit generate";
    }

    showEmpty();
    if (mode === "generate" && document.getElementById("gen-result").children.length > 0) {
      hideEmpty(); document.getElementById("gen-result").classList.remove("hidden");
    }
    if (mode === "variations" && varCards.length > 0) {
      hideEmpty(); document.getElementById("var-result").classList.remove("hidden");
    }
  }

  function showEmpty() {
    document.getElementById("empty-state").classList.remove("hidden");
    document.getElementById("gen-result").classList.add("hidden");
    document.getElementById("var-result").classList.add("hidden");
  }
  function hideEmpty() { document.getElementById("empty-state").classList.add("hidden"); }

  // ── Upload ──
  function uploadClick() { document.getElementById("file-input").click(); }
  function onDragOver(e) { e.preventDefault(); document.getElementById("upload-zone").classList.add("drag"); }
  function onDragLeave() { document.getElementById("upload-zone").classList.remove("drag"); }
  function onDrop(e) { e.preventDefault(); onDragLeave(); processFile(e.dataTransfer.files[0]); }
  function onFileChange(e) { processFile(e.target.files[0]); }

  function processFile(file) {
    if (!file || !file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      refImageBase64 = e.target.result.split(",")[1];
      refImageType   = file.type;
      document.getElementById("up-empty").classList.add("hidden");
      document.getElementById("up-preview").classList.remove("hidden");
      document.getElementById("up-img").src = e.target.result;
      document.getElementById("upload-zone").classList.add("filled");
      document.getElementById("upload-zone").onclick = null;
    };
    reader.readAsDataURL(file);
  }

  function clearUpload() {
    refImageBase64 = null; refImageType = null;
    document.getElementById("up-empty").classList.remove("hidden");
    document.getElementById("up-preview").classList.add("hidden");
    document.getElementById("upload-zone").classList.remove("filled");
    document.getElementById("upload-zone").onclick = uploadClick;
  }

  // ── API call ──
  async function callAPI(textPrompt, imageBase64, imageType) {
    const parts = [];
    if (imageBase64) parts.push({ inline_data: { mime_type: imageType, data: imageBase64 } });
    parts.push({ text: textPrompt });

    const res = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts }],
        generationConfig: { responseModalities: ["TEXT", "IMAGE"] },
      }),
    });

    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d?.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const resParts = data?.candidates?.[0]?.content?.parts || [];
    const imgPart = resParts.find(p => p.inline_data?.mime_type?.startsWith("image/"));
    if (!imgPart) throw new Error("No image returned. Try again.");
    return imgPart.inline_data.data;
  }

  // ── Prompts ──
  function generatePrompt(desc, style, mood) {
    return `Create a single mascot/character for a mobile app.

App description: "${desc}"
Art style: ${style}
Mood/personality: ${mood}

Requirements:
- Design a unique, memorable character that represents this app
- TRANSPARENT background — nothing behind the character, no floor shadow
- Center the character with transparent space around it
- Make it suitable as a mobile app mascot: expressive, simple, iconic
- Output the character only on a fully transparent PNG background`;
  }

  function variationPrompt(desc) {
    return `Edit this mascot character with the following variation:

"${desc}"

Rules:
- Keep the EXACT same character identity, art style, proportions, and colors from the reference
- TRANSPARENT background — no background color, no white, no shadow
- Apply the variation naturally while preserving everything else
- Center the character on a transparent PNG`;
  }

  // ── Generate mascot ──
  async function handleGenerate() {
    const desc = document.getElementById("app-desc").value.trim();
    if (!desc) { showErr("gen-err", "Describe your app or character first."); return; }
    hideErr("gen-err");
    running = true;
    setGenLoading(true);
    hideEmpty();
    document.getElementById("gen-result").classList.remove("hidden");
    renderGenLoading();

    try {
      const b64 = await callAPI(generatePrompt(desc, selectedStyle, selectedMood));
      renderGenResult(b64);
    } catch(e) {
      renderGenError(e.message);
    }
    running = false;
    setGenLoading(false);
  }

  function setGenLoading(on) {
    const btn = document.getElementById("btn-generate");
    btn.disabled = on;
    btn.textContent = on ? "Generating…" : "Generate Mascot →";
  }

  function renderGenLoading() {
    document.getElementById("gen-result").innerHTML = `
      <div class="single-card">
        <div class="single-img checker">
          <div class="state-wrap"><div class="spin-lg"></div><span>generating</span></div>
        </div>
      </div>`;
  }

  function renderGenError(msg) {
    document.getElementById("gen-result").innerHTML = `
      <div class="single-card">
        <div class="single-img checker">
          <div class="state-wrap"><span style="color:var(--danger);font-size:11px;padding:16px;text-align:center">${msg}</span></div>
        </div>
      </div>`;
  }

  function renderGenResult(b64) {
    const src = `data:image/png;base64,${b64}`;
    document.getElementById("gen-result").innerHTML = `
      <div class="single-card">
        <div class="single-img checker">
          <img src="${src}" alt="mascot" />
        </div>
        <div class="single-foot">
          <button onclick="downloadImg('${src}', 'mascot.png')">↓ PNG</button>
          <button onclick="handleGenerate()">↻ Redo</button>
          <button class="primary" onclick="useAsReference('${b64}')">Use for Variations →</button>
        </div>
      </div>
      <p class="hint-text">Happy with it? Hit <strong>Use for Variations →</strong><br/>to generate poses & versions.</p>`;
  }

  function useAsReference(b64) {
    refImageBase64 = b64;
    refImageType = "image/png";
    document.getElementById("up-empty").classList.add("hidden");
    document.getElementById("up-preview").classList.remove("hidden");
    document.getElementById("up-img").src = `data:image/png;base64,${b64}`;
    document.getElementById("upload-zone").classList.add("filled");
    document.getElementById("upload-zone").onclick = null;
    switchMode("variations");
  }

  // ── Variations ──
  async function handleVariations() {
    if (!refImageBase64) { showErr("var-err", "Upload a reference mascot image."); return; }
    const lines = document.getElementById("var-text").value.split("\n").map(l=>l.trim()).filter(Boolean);
    if (!lines.length) { showErr("var-err", "Add at least one variation."); return; }
    hideErr("var-err");

    running = true; aborted = false;
    document.getElementById("btn-variations").classList.add("hidden");
    document.getElementById("btn-stop").classList.remove("hidden");

    varCards = lines.map(label => ({ label, b64: null, loading: true, error: null }));
    renderVarGrid();
    hideEmpty();
    document.getElementById("var-result").classList.remove("hidden");

    await Promise.allSettled(lines.map(async (label, i) => {
      if (aborted) return;
      try {
        const b64 = await callAPI(variationPrompt(label), refImageBase64, refImageType);
        varCards[i] = { label, b64, loading: false, error: null };
      } catch(e) {
        varCards[i] = { label, b64: null, loading: false, error: e.message };
      }
      renderVarGrid();
    }));

    running = false;
    document.getElementById("btn-variations").classList.remove("hidden");
    document.getElementById("btn-stop").classList.add("hidden");
  }

  function stopGeneration() {
    aborted = true; running = false;
    document.getElementById("btn-variations").classList.remove("hidden");
    document.getElementById("btn-stop").classList.add("hidden");
  }

  function renderVarGrid() {
    const done  = varCards.filter(c => c.b64).length;
    const total = varCards.length;

    let html = `
      <div class="canvas-head">
        <span class="prog-label"><span>${done}</span> / ${total} complete</span>
        ${done > 0 ? `<button class="dl-all" onclick="downloadAll()">↓ Download All PNGs</button>` : ""}
      </div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${total>0?(done/total)*100:0}%"></div></div>
      <div class="grid">`;

    varCards.forEach((c, i) => {
      html += `<div class="rcard">
        <div class="rcard-img checker">`;

      if (c.loading) {
        html += `<div class="state-wrap"><div class="spin"></div><span>generating</span></div>`;
      } else if (c.error) {
        html += `<div class="state-wrap"><span style="color:var(--danger);font-size:18px">!</span><span style="color:var(--danger)">failed</span></div>`;
      } else if (c.b64) {
        html += `<img src="data:image/png;base64,${c.b64}" alt="${c.label}" />`;
      }

      html += `</div>
        <div class="rcard-foot">
          <span class="rcard-label" title="${c.label}">${c.label}</span>
          <div class="rcard-btns">
            ${!c.loading ? `<button class="cbtn" onclick="regenVariation(${i})">↻</button>` : ""}
            ${c.b64 ? `<button class="cbtn hi" onclick="downloadImg('data:image/png;base64,${c.b64}','${c.label.toLowerCase().replace(/\W+/g,"-")}.png')">↓ PNG</button>` : ""}
          </div>
        </div>
      </div>`;
    });

    html += "</div>";
    document.getElementById("var-result").innerHTML = html;
  }

  async function regenVariation(i) {
    if (!varCards[i]) return;
    const label = varCards[i].label;
    varCards[i] = { label, b64: null, loading: true, error: null };
    renderVarGrid();
    try {
      const b64 = await callAPI(variationPrompt(label), refImageBase64, refImageType);
      varCards[i] = { label, b64, loading: false, error: null };
    } catch(e) {
      varCards[i] = { label, b64: null, loading: false, error: e.message };
    }
    renderVarGrid();
  }

  function downloadAll() {
    varCards.forEach(c => {
      if (!c.b64) return;
      downloadImg(`data:image/png;base64,${c.b64}`, `${c.label.toLowerCase().replace(/\W+/g,"-")}.png`);
    });
  }

  function downloadImg(src, filename) {
    const a = document.createElement("a");
    a.href = src; a.download = filename; a.click();
  }

  // ── Errors ──
  function showErr(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.classList.remove("hidden"); }
  function hideErr(id) { document.getElementById(id).classList.add("hidden"); }
</script>
</body>
</html>
